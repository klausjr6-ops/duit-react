<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Ikon persegi membulat dengan gradien hijau, toska, biru, dan ungu sebagai latar, serta huruf D berwarna putih berukuran lebih proporsional dengan ruang kosong di sekelilingnya.</desc>
